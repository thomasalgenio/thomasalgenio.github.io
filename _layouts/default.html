<!doctype html>
<!--
  data-theme and lang get set BEFORE paint by the inline script below,
  so there's no flash of the wrong theme on load.
-->
<html lang="{{ site.default_lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }} — {{ site.role }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

  <!-- AOS: scroll-reveal animations, vanilla JS, no React needed -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.1/aos.css">

  <!-- Translations, generated from _data/translations.yml at build time -->
  <script>
    window.TRANSLATIONS = {{ site.data.translations | jsonify }};
    window.DEFAULT_LANG = "{{ site.default_lang }}";
  </script>

  <!-- Set theme + language as early as possible to avoid a flash of the wrong one -->
  <script>
    (function () {
      var theme = localStorage.getItem('theme') ||
        (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);

      var lang = localStorage.getItem('lang') || window.DEFAULT_LANG;
      document.documentElement.setAttribute('lang', lang);
    })();
  </script>
</head>
<body>

  {% include nav.html %}

  <main>
    {{ content }}
  </main>

  {% include footer.html %}

  <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.1/aos.js"></script>

  <!-- Only load EmailJS if you've actually configured it (see assets/js/main.js) -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

  <script src="{{ '/assets/js/i18n.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
