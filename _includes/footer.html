<footer class="footer">
  <div class="footer-inner">
    <p class="footer-line" data-i18n="footer_built">Built from scratch with Jekyll, no framework required.</p>
    <div class="footer-links">
      <a href="https://github.com/{{ site.github_username }}" target="_blank" rel="noopener">GitHub</a>
      <a href="https://linkedin.com/in/{{ site.linkedin_username }}" target="_blank" rel="noopener">LinkedIn</a>
      <a href="mailto:{{ site.email }}">{{ site.email }}</a>
    </div>
    <p class="footer-copyright">&copy; {{ site.time | date: '%Y' }} {{ site.title }}</p>
  </div>
</footer>
